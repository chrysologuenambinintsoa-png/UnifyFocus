<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion — UnifyFocus</title>
    <link rel="icon" href="./logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <div class="logo-wrapper">
          <div class="logo-icon">&#10022;</div>
          <span class="logo-text">UnifyFocus</span>
        </div>
        <nav>
          <a href="./index.html">Accueil</a>
          <a href="./app.html">Application</a>
          <span>Connexion</span>
        </nav>
        <h1>Connexion à votre espace</h1>
        <p class="subtitle">Connectez-vous pour accéder à votre tableau de bord et profiter de l’expérience UnifyFocus.</p>
        <form class="form-card" action="#" method="post">
          <label>
            Email
            <input type="email" name="email" placeholder="votre@email.com" required />
          </label>
          <label>
            Mot de passe
            <input type="password" name="password" placeholder="••••••••" required />
          </label>
          <button type="submit" class="btn">Se connecter</button>
        </form>
        <p class="footer-note">Retour à <a href="./index.html">l’accueil</a></p>
      </div>
    </div>
  </body>
</html>
