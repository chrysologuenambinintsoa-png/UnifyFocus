<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primary-gradient" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spin-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .spin { animation: spin 20s linear infinite; transform-origin: 24px 24px; }
    .spin-rev { animation: spin-rev 15s linear infinite; transform-origin: 24px 24px; }
    .pulse { animation: pulse 2s infinite; }
  </style>
  <path d="M24 2 L44 13 L44 35 L24 46 L4 35 L4 13 Z" fill="url(#primary-gradient)" opacity="0.06" />
  <path class="spin" d="M24 5 L41 14.5 L41 33.5 L24 43 L7 33.5 L7 14.5 Z" stroke="url(#primary-gradient)" stroke-width="1.2" fill="none" filter="url(#glow)" />
  <path class="spin-rev" d="M24 10 L36 17 L36 31 L24 38 L12 31 L12 17 Z" stroke="url(#primary-gradient)" stroke-width="1.5" fill="none" filter="url(#glow)" />
  <circle cx="24" cy="10" r="2" fill="url(#primary-gradient)" filter="url(#glow)" />
  <circle cx="36" cy="17" r="2" fill="url(#primary-gradient)" filter="url(#glow)" />
  <circle cx="36" cy="31" r="2" fill="url(#primary-gradient)" filter="url(#glow)" />
  <circle cx="24" cy="38" r="2" fill="url(#primary-gradient)" filter="url(#glow)" />
  <circle cx="12" cy="31" r="2" fill="url(#primary-gradient)" filter="url(#glow)" />
  <circle cx="12" cy="17" r="2" fill="url(#primary-gradient)" filter="url(#glow)" />
  <path d="M24 12 L24 36 M14 18 L34 30 M34 18 L14 30" stroke="url(#primary-gradient)" stroke-width="0.8" opacity="0.5" />
  <circle cx="24" cy="24" r="8" fill="url(#primary-gradient)" opacity="0.12" />
  <circle cx="24" cy="24" r="5" fill="url(#primary-gradient)" opacity="0.2" filter="url(#glow)" />
  <circle class="pulse" cx="24" cy="24" r="3" fill="url(#primary-gradient)" filter="url(#glow)" />
  <circle cx="24" cy="16" r="1.5" fill="#38bdf8" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="32" cy="24" r="1.5" fill="#f59e0b" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="120 24 24" to="480 24 24" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="20" cy="31" r="1.5" fill="#7c3aed" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="240 24 24" to="600 24 24" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>